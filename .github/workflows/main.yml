name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # bisa juga dipicu manual dari tab Actions di GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      # Proyek ini pakai AGP 9.1.1 + compileSdk 36 (lihat gradle/libs.versions.toml),
      # yang butuh JDK 21 — JDK 17 akan gagal build dengan error semacam
      # "Dependency requires at least JVM runtime version 21".
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Proyek ini belum menyertakan Gradle Wrapper (gradlew / gradle-wrapper.jar),
      # jadi kita pakai Gradle resmi lewat action ini alih-alih ./gradlew.
      # gradle-version: "current" -> otomatis pakai rilis stabil terbaru,
      # supaya tidak perlu update angka versi manual tiap kali Gradle rilis baru.
      # Begitu kamu buka project ini di Android Studio sekali saja, Android
      # Studio akan otomatis membuatkan gradlew — setelah itu commit filenya
      # dan workflow ini bisa disederhanakan pakai ./gradlew seperti biasa.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "current"

      - name: Buat file .env dari GitHub Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Generate debug.keystore
        # build.gradle.kts mengarahkan signing config debug ke file ini di root
        # project. File ini sengaja tidak disimpan di repo (keystore tidak boleh
        # di-commit), jadi dibuat ulang tiap kali build pakai kredensial default
        # Android debug keystore (storePassword/keyPassword: "android").
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK debug
        # --stacktrace supaya kalau gagal lagi, log di tab Actions langsung
        # menunjukkan baris error yang jelas, bukan pesan generik.
        run: gradle assembleDebug --stacktrace

      - name: Upload APK sebagai artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-meta-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload log build kalau gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
